<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Lugares ao redor dos EUA" />
    <meta name="author" content="Luiz Benaduce" />
    <meta
      name="keywords"
      content="exploração, viagens, EUA, TripleTen, paisagens"
    />
    <title>Around The U.S.</title>

    <link rel="stylesheet" href="./pages/index.css" />
  </head>

  <body class="page">
    <noscript>Este site usa JavaScript. Ative-o para melhor experiência.</noscript>

    <header class="header page__section">
      <img
        class="header__vetor"
        src="./images/around-the-us.png"
        alt="Around the U.S."
      />
    </header>

    <main class="main page__section">
      <section class="profile">
        <img
          class="profile__avatar"
          src="./images/avatar.png"
          alt="Jacques Cousteau"
        />
        <h1 class="profile__name">Jacques Cousteau</h1>
        <button
          class="profile__pen"
          type="button"
          aria-label="Editar perfil"
        ></button>
        <h2 class="profile__description">Explorador</h2>
        <button
          class="profile__plus"
          type="button"
          aria-label="Adicionar novo local"
        ></button>
      </section>

      <!-- CONTAINER DOS CARDS -->
      <section class="elements" aria-live="polite"></section>
    </main>

    <footer class="footer page__section">
      <p class="footer__copyright">
        &copy; 2025 Around The U.S. — Luigi Benaduce
      </p>
    </footer>

    <!-- POPUP EDITAR PERFIL -->
    <div
      class="popup popup-hidden"
      id="popup-profile"
      role="dialog"
      aria-modal="true"
    >
      <div class="popup__container">
        <button class="popup__close" type="button"></button>
        <h2 class="popup__text">Editar perfil</h2>

        <form class="popup__profile" novalidate>
          <input
            class="popup__name"
            type="text"
            id="name"
            name="name"
            placeholder="Nome"
            minlength="2"
            maxlength="40"
            required
          />
          <span class="popup__error" id="name-error"></span>

          <input
            class="popup__about"
            type="text"
            id="about"
            name="about"
            placeholder="Sobre mim"
            minlength="2"
            maxlength="200"
            required
          />
          <span class="popup__error" id="about-error"></span>

          <button class="popup__save" type="submit" disabled>
            Salvar
          </button>
        </form>
      </div>
    </div>

    <!-- POPUP ADICIONAR CARD -->
    <div
      class="popup popup-hidden"
      id="popup-addpic"
      role="dialog"
      aria-modal="true"
    >
      <div class="popup__container">
        <button class="popup__close" type="button"></button>
        <h2 class="popup__text">Novo local</h2>

        <form class="popup__addpic" novalidate>
          <input
            class="popup__name"
            id="local-name"
            type="text"
            name="local-name"
            placeholder="Título"
            minlength="2"
            maxlength="30"
            required
          />
          <span class="popup__error" id="local-name-error"></span>

          <input
            class="popup__about"
            id="link"
            type="url"
            name="link"
            placeholder="Link da imagem"
            required
          />
          <span class="popup__error" id="link-error"></span>

          <button class="popup__save" type="submit" disabled>
            Criar
          </button>
        </form>
      </div>
    </div>

    <!-- POPUP IMAGEM -->
    <div
      class="popup popup-hidden"
      id="popup"
      role="dialog"
      aria-modal="true"
    >
      <div class="popup__container-zoom">
        <button class="popup__close popup__close-zoom" type="button"></button>
        <img class="popup__zoom" src="" alt="" />
        <p class="popup__caption"></p>
      </div>
    </div>

    <!-- POPUP CONFIRMAÇÃO -->
    <div
      class="popup popup-hidden"
      id="popup-confirm"
      role="dialog"
      aria-modal="true"
    >
      <div class="popup__container">
        <button class="popup__close" type="button"></button>
        <h2 class="popup__text">Tem certeza?</h2>

        <div class="popup__buttons">
          <button class="popup__save popup__save--confirm" type="button">
            Sim
          </button>
          <button class="popup__save popup__save--cancel" type="button">
            Não
          </button>
        </div>
      </div>
    </div>

    <!-- POPUP AVATAR -->
    <div
      class="popup popup-hidden"
      id="popup-avatar"
      role="dialog"
      aria-modal="true"
    >
      <div class="popup__container">
        <button class="popup__close" type="button"></button>
        <h2 class="popup__text">Alterar foto de perfil</h2>

        <form class="popup__avatar-form" id="avatar-form" novalidate>
          <input
            class="popup__avatar"
            type="url"
            id="avatar-link"
            name="avatar"
            placeholder="Link da nova foto"
            required
          />
          <span class="popup__error" id="avatar-link-error"></span>

          <button class="popup__save" type="submit" disabled>
            Salvar
          </button>
        </form>
      </div>
    </div>

    <!-- TEMPLATE DO CARD -->
    <template id="cardTemplate">
      <article class="elements__card">
        <img class="elements__image" src="" alt="" />
        <button class="elements__remove" type="button"></button>

        <div class="elements__caption">
          <p class="elements__text"></p>
          <button class="elements__like" type="button"></button>
        </div>
      </article>
    </template>

    <!-- SCRIPT -->
    <script type="module" src="./scripts/index.js"></script>
  </body>
</html>
